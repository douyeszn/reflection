<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-labelledby="spark-title">
  <title id="spark-title">Reflection</title>
  <rect width="40" height="40" rx="10" fill="#0F766E"/>
  <!-- Subtle baseline -->
  <line x1="6" y1="33" x2="34" y2="33" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rising signal curve -->
  <path d="M6,31 C10,31 14,22 20,16 C26,10 30,9 32,8" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- 4-pointed star at apex (32,8): outer r=4.5, inner r=1.8 -->
