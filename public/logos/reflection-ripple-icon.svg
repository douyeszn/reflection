<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-labelledby="ripple-title">
  <title id="ripple-title">Reflection</title>
  <rect width="40" height="40" rx="10" fill="#0C1825"/>
  <!-- Origin dot -->
  <circle cx="8" cy="32" r="2.5" fill="#2dd4bf"/>
  <!-- Arc 1 — closest, full opacity -->
  <path d="M8,24 A8,8 0 0 1 16,32" stroke="#2dd4bf" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Arc 2 — mid opacity -->
  <path d="M8,18 A14,14 0 0 1 22,32" stroke="#2dd4bf" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Arc 3 — fading -->
  <path d="M8,12 A20,20 0 0 1 28,32" stroke="#2dd4bf" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
</svg>
